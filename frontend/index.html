<!DOCTYPE html>
<html>
<head>
  <title>CycloWind</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>
  <h2>CycloWind</h2>
  <button onclick="loadRoute()">Calculer trajet</button>
  <pre id="output"></pre>

  <script>
    async function loadRoute() {
      const res = await fetch("http://127.0.0.1:8000/route?wind_dir=0&wind_speed=15");
      const data = await res.json();
      document.getElementById("output").innerText = JSON.stringify(data);
    }
  </script>
</body>
</html>
